name: Bank Stock Monitor

on:
  schedule:
    # 平日（月〜金）の日本時間 15:10（UTC 06:10）に自動実行
    - cron: '10 6 * * 1-5'
  workflow_dispatch: # 手動でテスト実行できるようにするボタン

jobs:
  run-monitor:
    runs-runs-on: ubuntu-latest
    steps:
      - name: コードの取得
        uses: actions/checkout@v3

      - name: Python環境のセットアップ
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: ライブラリのインストール
        run: |
          pip install -r requirements.txt

      - name: プログラムの実行
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}
        run: |
          python bank_monitor.py
